<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register - Clothify</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar before login -->
    <header class="main-header">
        <div class="brand">
            <span class="brand-symbol">🛍️</span>
            <span class="brand-text">Clothify</span>
        </div>

        <div class="search-box">
            <span class="search-symbol">🔍</span>
            <input type="text" placeholder="Search for Products, Brands and More">
        </div>

        <nav class="main-nav">
            <a href="home"><span class="nav-symbol">🏠</span> Home</a>
            <a href="products"><span class="nav-symbol">🛍️</span> Products</a>
            <a href="login.html"><span class="nav-symbol">🔐</span> Login</a>
            <a href="register.html"><span class="nav-symbol">📝</span> Register</a>
        </nav>
    </header>

    <section class="page-title">
        <h1>Register</h1>
        <p>Create your Clothify account</p>
    </section>

    <section class="form-container">
        <form class="form-box" action="register" method="post">
            <h2>User Registration</h2>

            <label>Full Name</label>
            <input type="text" name="full_name" placeholder="Enter your full name" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>

            <label>Phone</label>
            <input type="text" name="phone" placeholder="Enter your phone number" required>

            <label>Address</label>
            <input type="text" name="address" placeholder="Enter your address" required>

            <label>City</label>
            <input type="text" name="city" placeholder="Enter your city" required>

            <label>State</label>
            <input type="text" name="state" placeholder="Enter your state" required>

            <label>Pincode</label>
            <input type="text" name="pincode" placeholder="Enter your pincode" required>

            <button type="submit">Register</button>

            <p>Already have an account? <a href="login.html">Login here</a></p>
        </form>
    </section>

</body>
</html>
